spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/saasdb
    username: saasuser
    password: localpassword
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: "mylocalsecretkey12345678901234567890123456789012"
  access-token-expiry-ms: 900000

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/saasdb
    username: saasuser
    password: localpassword
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: "mylocalsecretkey12345678901234567890123456789012"
  access-token-expiry-ms: 900000

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  packages-to-scan: com.saas.platform.controller

server:
  port: 8080